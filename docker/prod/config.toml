# TIDX Indexer Configuration
#
# RPC URLs are sourced from env vars (see `.env.example`). Pass them to the
# tidx container via docker-compose (`env_file:` already wired).

[http]
enabled = true
port = 8080
bind = "0.0.0.0"

[prometheus]
enabled = true
port = 9090

[[chains]]
name = "moderato"
chain_id = 42431
rpc_url_env = "TIDX_RPC_URL_MODERATO"
pg_url = "postgres://tidx:tidx@postgres:5432/tidx_moderato"
backfill = true
batch_size = 100

# ClickHouse OLAP engine (optional)
[chains.clickhouse]
enabled = true
url = "http://clickhouse:8123"

[[chains]]
name = "mainnet"
chain_id = 4217
rpc_url_env = "TIDX_RPC_URL_MAINNET"
pg_url = "postgres://tidx:tidx@postgres:5432/tidx_mainnet"
backfill = true
batch_size = 100

# ClickHouse OLAP engine (optional)
[chains.clickhouse]
enabled = true
url = "http://clickhouse:8123"
