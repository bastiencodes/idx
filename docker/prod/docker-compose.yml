services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ak47
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ak47}
      POSTGRES_DB: ak47
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ak47 -d ak47"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  ak47:
    build:
      context: ../..
      dockerfile: Dockerfile
    command:
      - up
      - --config
      - /config.toml
    ports:
      - "8080:8080"   # HTTP API
      - "9090:9090"   # Prometheus metrics
    volumes:
      - ./config.toml:/config.toml:ro
      - duckdb_data:/data
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      RUST_LOG: ${RUST_LOG:-ak47=info}
    restart: unless-stopped

volumes:
  postgres_data:
  duckdb_data:
